<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastvideo - Descargador Local</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --background: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --text-muted: #9ca3af;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--background); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; text-align: center; }
        .header { margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header h1 i { color: var(--primary); }
        .search-box { background: var(--card); padding: 10px; border-radius: 20px; display: flex; gap: 10px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 20px; outline: none; font-size: 1rem; }
        button { background: var(--primary); border: none; color: white; padding: 12px 25px; border-radius: 15px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        #result { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 20px; display: none; }
        .thumb { width:100%; border-radius:15px; margin-bottom:15px; }
        #status { margin-top: 15px; font-size: 0.9rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="main-title"><i data-lucide="zap"></i> Fastvideo Local</h1>
            <p style="color:var(--text-muted); margin-top:10px;">Pega el link de YouTube y descarga al instante</p>
        </div>

        <div class="search-box">
            <input type="text" id="video-url" placeholder="Pega el enlace de YouTube aquí...">
            <button id="btn-fetch"><i data-lucide="search"></i> Buscar</button>
        </div>

        <div id="result">
            <video id="video-player" controls style="width:100%; border-radius:15px; margin-bottom:15px; display:none; background: #000;"></video>
            <img id="video-thumb" src="" class="thumb">
            <h3 id="video-title" style="margin-bottom:20px;">Título del video</h3>
            <button id="btn-download" style="width:100%; justify-content:center; padding:15px; font-size:1.1rem;">
                <i data-lucide="download"></i> Descargar MP4
            </button>
        </div>
        
        <div id="status"></div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
